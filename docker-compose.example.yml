services:
  backend:
    image: tanjd/bookshelf-backend:latest
    container_name: bookshelf-backend
    restart: unless-stopped
    # Port 8000 is only needed if you want direct API access for debugging.
    # ports:
    #   - "8000:8000"
    volumes:
      # TrueNAS: use an absolute dataset path, e.g. /mnt/tank/bookshelf
      # Local:   ./data works fine
      - /mnt/tank/bookshelf:/app/data
    environment:
      - ENV=prd
      - PORT=8000
      - DB_PATH=/app/data/bookshelf.db
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=https://${DOMAIN}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@yourdomain.com}
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: tanjd/bookshelf-frontend:latest
    container_name: bookshelf-frontend
    restart: unless-stopped
    # No ports exposed — Cloudflare Tunnel connects to this container on the
    # internal Docker network, so no inbound ports need to be open on the host.
    environment:
      - BACKEND_URL=http://bookshelf-backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode < 400 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: bookshelf-cloudflared
    restart: unless-stopped
    # Tunnel config (ingress rules) lives in the Cloudflare dashboard.
    # Set the public hostname there to route to http://bookshelf-frontend:3000.
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      frontend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
