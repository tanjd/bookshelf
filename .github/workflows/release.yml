name: Release

on:
  # Manual trigger from the Actions tab.
  # Once you're ready for automatic releases after every CI pass on main,
  # replace the above with:
  #   workflow_run:
  #     workflows: [CI]
  #     branches: [main]
  #     types: [completed]
  #   workflow_dispatch:
  workflow_dispatch:

# Only one release at a time — never cancel in-progress.
concurrency:
  group: release
  cancel-in-progress: false

# Default to read-only; jobs that need write access declare it explicitly.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Verify both Docker images build successfully.
  # Semantic release only runs if this passes, ensuring we never tag a release
  # that produces broken images. Layers are cached for reuse by docker-push.
  # ---------------------------------------------------------------------------
  build-check:
    name: Verify Docker Builds
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend (verify — no push)
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend (verify — no push)
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ---------------------------------------------------------------------------
  # Job 2: Bump version, write changelog, create GitHub release + tag.
  # Blocked on build-check succeeding.
  # ---------------------------------------------------------------------------
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-check

    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      released: ${{ steps.release.outputs.new_release_published }}
      tag: ${{ steps.release.outputs.new_release_git_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure SSH commit signing
        run: |
          git config --global user.name "tanjd"
          git config --global user.email "42729752+tanjd@users.noreply.github.com"
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_SIGNING_KEY }}" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key
          printf '%s\n' "${{ secrets.SSH_PUBLIC_SIGNING_KEY }}" > ~/.ssh/signing_key.pub
          git config --global gpg.format ssh
          git config --global user.signingkey ~/.ssh/signing_key.pub
          git config --global commit.gpgsign true

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/npm
        env:
          GITHUB_TOKEN: ${{ secrets.GHA_TRIGGER_TOKEN }}
          GIT_AUTHOR_NAME: "tanjd"
          GIT_AUTHOR_EMAIL: "42729752+tanjd@users.noreply.github.com"
          GIT_COMMITTER_NAME: "tanjd"
          GIT_COMMITTER_EMAIL: "42729752+tanjd@users.noreply.github.com"

  # ---------------------------------------------------------------------------
  # Job 3: Build images at the release tag and push to Docker Hub.
  # GHA layer cache from build-check means only version-file layers rebuild;
  # all heavy dependency layers are served from cache.
  # Skipped entirely when semantic-release produced no new release.
  # ---------------------------------------------------------------------------
  docker-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "::error::DOCKER_USERNAME is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::DOCKERHUB_TOKEN is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Checkout at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image names
        id: meta
        run: |
          VERSION="${{ needs.semantic-release.outputs.tag }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          BACKEND_PROJECT="${{ secrets.DOCKERHUB_PROJECT_NAME_BACKEND }}"
          [ -z "$BACKEND_PROJECT" ] && BACKEND_PROJECT="bookshelf-backend"
          echo "backend_image=${{ secrets.DOCKER_USERNAME }}/$BACKEND_PROJECT" >> "$GITHUB_OUTPUT"

          FRONTEND_PROJECT="${{ secrets.DOCKERHUB_PROJECT_NAME }}"
          [ -z "$FRONTEND_PROJECT" ] && FRONTEND_PROJECT="bookshelf"
          echo "frontend_image=${{ secrets.DOCKER_USERNAME }}/$FRONTEND_PROJECT" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ needs.semantic-release.outputs.tag }}
          tags: |
            ${{ steps.meta.outputs.backend_image }}:latest
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:latest
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
