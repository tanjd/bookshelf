version: "2"
linters:
  enable:
    - asciicheck
    - bodyclose
    - errcheck
    - errname
    - gocritic
    - gosec
    - ineffassign
    - misspell
    - noctx
    - revive
    - rowserrcheck
    - staticcheck
    - unused
    - wastedassign
    - whitespace
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - build$
issues:
  exclude-dirs:
    - vendor
  exclusions:
    rules:
      # Interface implementations in the gorm package don't need redundant
      # doc comments — documentation lives on the repository interfaces.
      - path: "backend/internal/repository/gorm"
        linters:
          - revive
        text: "(exported|package-comments)"
