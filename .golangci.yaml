version: "2"
linters:
  enable:
    - asciicheck
    - bodyclose
    - errcheck
    - errname
    - gocritic
    - gosec
    - ineffassign
    - misspell
    - noctx
    - revive
    - rowserrcheck
    - staticcheck
    - unused
    - wastedassign
    - whitespace
formatters:
  enable:
    - gofmt
    - goimports
exclusions:
  generated: lax
  paths:
    - vendor
    - third_party$
    - builtin$
    - examples$
    - build$
